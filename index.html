<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediaTrustCascades</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #111;
      color: #ddd;
      font: 12px/1.5 monospace;
    }

    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-width: 0;
    }

    canvas {
      image-rendering: pixelated;
      width:  min(calc(100vh - 32px), calc(100vw - 292px));
      height: min(calc(100vh - 32px), calc(100vw - 292px));
      border: 1px solid #2a2a2a;
      display: block;
    }

    #controls {
      width: 260px;
      flex-shrink: 0;
      background: #161616;
      border-left: 1px solid #2a2a2a;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 { font-size: 11px; color: #666; letter-spacing: 0.05em; text-transform: uppercase; }

    .btn-row { display: flex; gap: 6px; }
    button {
      flex: 1; padding: 6px 0;
      background: #252525; border: 1px solid #333;
      color: #ccc; cursor: pointer; border-radius: 3px;
      font: inherit;
    }
    button:hover { background: #2e2e2e; }

    .section {
      border: 1px solid #252525;
      border-radius: 4px;
      padding: 9px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .section-title { color: #aaa; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .row label { color: #777; flex: 1; }
    .row .num  { color: #bbb; min-width: 36px; text-align: right; font-size: 11px; }

    input[type="range"] { width: 90px; flex-shrink: 0; accent-color: #555; cursor: pointer; }

    .trust-scale {
      height: 10px;
      border-radius: 3px;
      background: linear-gradient(to right, #d41111, #11d411, #1111d4);
      margin-top: 2px;
    }
    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
      font-size: 11px;
      color: #666;
    }
    .stats-grid span { color: #999; }
  </style>
</head>
<body>

<div id="canvas-area">
  <canvas id="sim-canvas"></canvas>
</div>

<div id="controls">
  <h1>MediaTrustCascades</h1>

  <div class="btn-row">
    <button id="btn-play">Pause</button>
    <button id="btn-reset">Reset</button>
  </div>

  <!-- Simulation speed -->
  <div class="section">
    <div class="row">
      <label>Target FPS</label>
      <input type="range" id="target-fps" min="1" max="60" step="1" value="28">
      <span class="num" id="target-fps-val">28</span>
    </div>
    <div class="row">
      <label>Steps / frame</label>
      <input type="range" id="sim-speed" min="1" max="20" step="1" value="20">
      <span class="num" id="sim-speed-val">20</span>
    </div>
    <div class="row">
      <label>Grid size ↺</label>
      <input type="range" id="grid-size" min="10" max="200" step="5" value="200">
      <span class="num" id="grid-size-val">200</span>
    </div>
  </div>

  <!-- Trust dynamics -->
  <div class="section">
    <div class="section-title">Trust</div>
    <div class="row">
      <label>Build rate</label>
      <input type="range" id="trust-build-rate" min="0.0001" max="0.01" step="0.0001" value="0.0007">
      <span class="num" id="trust-build-rate-val">0.0007</span>
    </div>
    <div class="row">
      <label>Threshold</label>
      <input type="range" id="trust-threshold" min="0" max="1" step="0.01" value="0.5">
      <span class="num" id="trust-threshold-val">0.5</span>
    </div>
  </div>

  <!-- Error events -->
  <div class="section">
    <div class="section-title">Errors</div>
    <div class="row">
      <label>Check every N ticks</label>
      <input type="range" id="factcheck-interval" min="1" max="200" step="1" value="4">
      <span class="num" id="factcheck-interval-val">4</span>
    </div>
    <div class="row">
      <label>Error probability</label>
      <input type="range" id="error-rate" min="0" max="0.2" step="0.001" value="0.01">
      <span class="num" id="error-rate-val">0.01</span>
    </div>
    <div class="row">
      <label>Mean loss</label>
      <input type="range" id="error-mean" min="0.01" max="0.5" step="0.01" value="0.2">
      <span class="num" id="error-mean-val">0.2</span>
    </div>
    <div class="row">
      <label>Std deviation</label>
      <input type="range" id="error-std" min="0" max="0.3" step="0.01" value="0.05">
      <span class="num" id="error-std-val">0.05</span>
    </div>
  </div>

  <!-- Propagation -->
  <div class="section">
    <div class="section-title">Propagation</div>
    <div class="row">
      <label>Copy likelihood</label>
      <input type="range" id="copy-likelihood" min="0" max="1" step="0.01" value="0.44">
      <span class="num" id="copy-likelihood-val">0.44</span>
    </div>
    <div class="row">
      <label>Contagion threshold</label>
      <input type="range" id="contagion-threshold" min="0" max="8" step="1" value="2">
      <span class="num" id="contagion-threshold-val">2</span>
    </div>
    <div class="row">
      <label>Propagation reset</label>
      <input type="range" id="propagation-reset-threshold" min="0" max="1" step="0.01" value="0.8">
      <span class="num" id="propagation-reset-threshold-val">0.8</span>
    </div>
    <div class="row">
      <label>Diagonally adjacent</label>
      <input type="checkbox" id="diagonal">
    </div>
  </div>

  <!-- Color scale -->
  <div class="section">
    <div class="section-title">Trust scale</div>
    <div class="trust-scale"></div>
    <div class="scale-labels"><span>0 — low</span><span>0.5</span><span>1 — high</span></div>
  </div>

  <!-- Live stats -->
  <div class="section">
    <div class="stats-grid">
      <div>Avg trust</div>  <div><span id="stat-avg">1.000</span></div>
      <div>Min trust</div>  <div><span id="stat-min">1.000</span></div>
      <div>Max trust</div>  <div><span id="stat-max">1.000</span></div>
      <div>Wavefront</div>  <div><span id="stat-front">0</span></div>
    </div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>

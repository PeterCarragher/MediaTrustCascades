server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;

    # Serve ES modules with the correct MIME type
    types {
        text/html                  html;
        text/css                   css;
        application/javascript     js;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
